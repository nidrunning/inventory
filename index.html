<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NID Running — 庫存系統</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f4f0;
  --cream: #ede9e0;
  --accent: #e8521a;
  --blue: #1a8ce8;
  --green: #27ae60;
  --yellow: #f1c40f;
  --purple: #9b59b6;
  --gray: #888;
  --border: rgba(255,255,255,0.08);
  --card: #141414;
  --input-bg: rgba(255,255,255,0.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--black); color:var(--white); min-height:100vh; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,10,0.96); backdrop-filter:blur(12px);
}
.logo { display:flex; align-items:baseline; gap:10px; }
.logo-main { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; }
.logo-tag { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:2px; }
.header-actions { display:flex; gap:10px; align-items:center; }
.sync-status { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray); display:flex; align-items:center; gap:6px; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--gray); }
.sync-dot.online { background:var(--green); animation:pulse 2s infinite; }
.sync-dot.loading { background:var(--yellow); animation:pulse 0.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── TABS ── */
.nav { display:flex; padding:0 32px; border-bottom:1px solid var(--border); background:#0d0d0d; overflow-x:auto; }
.tab { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  padding:14px 22px; cursor:pointer; color:var(--gray); border-bottom:2px solid transparent;
  transition:all 0.2s; white-space:nowrap; }
.tab:hover { color:var(--white); }
.tab.active { color:var(--white); border-bottom-color:var(--accent); }

/* ── MAIN ── */
.main { padding:28px 32px; }
.panel { display:none; }
.panel.active { display:block; }

/* ── STATS ── */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
.stat { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:22px; position:relative; overflow:hidden; }
.stat::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.stat.s1::before { background:var(--blue); }
.stat.s2::before { background:var(--accent); }
.stat.s3::before { background:var(--green); }
.stat.s4::before { background:var(--yellow); }
.stat-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--gray); text-transform:uppercase; margin-bottom:10px; }
.stat-val { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; letter-spacing:2px; }
.stat.s1 .stat-val { color:var(--blue); }
.stat.s2 .stat-val { color:var(--accent); }
.stat.s3 .stat-val { color:var(--green); }
.stat.s4 .stat-val { color:var(--yellow); }
.stat-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray); margin-top:5px; }

/* ── SECTION HEADER ── */
.sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.sec-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; }

/* ── BUTTONS ── */
.btn { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  padding:10px 20px; border:none; cursor:pointer; border-radius:3px; transition:all 0.2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#d44515; }
.btn-secondary { background:transparent; color:var(--white); border:1px solid var(--border); }
.btn-secondary:hover { border-color:rgba(255,255,255,0.3); }
.btn-sm { padding:6px 12px; font-size:10px; }
.btn-ghost { background:transparent; color:var(--gray); border:1px solid transparent; }
.btn-ghost:hover { color:var(--white); border-color:var(--border); }

/* ── TABLE ── */
.tbl-wrap { background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.tbl-toolbar { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
.search { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:3px; padding:8px 12px; }
.search input { background:transparent; border:none; outline:none; color:var(--white); font-family:'DM Mono',monospace; font-size:12px; width:220px; }
.search input::placeholder { color:var(--gray); }
table { width:100%; border-collapse:collapse; }
th { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--gray); padding:13px 18px; text-align:left; font-weight:400;
  border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:15px 18px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tbody tr { transition:background 0.15s; }
tbody tr:hover { background:rgba(255,255,255,0.03); }
.pname { font-weight:500; }
.psku { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray); margin-top:2px; }
.tag { display:inline-block; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px;
  text-transform:uppercase; padding:3px 8px; border-radius:2px; }
.tag-apparel { background:rgba(232,82,26,0.15); color:var(--accent); border:1px solid rgba(232,82,26,0.3); }
.tag-acc { background:rgba(26,140,232,0.15); color:var(--blue); border:1px solid rgba(26,140,232,0.3); }
.snum { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; }
.sbar { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; margin-top:5px; width:70px; }
.sfill { height:100%; border-radius:2px; }
.sfill.hi { background:var(--green); }
.sfill.md { background:var(--yellow); }
.sfill.lo { background:var(--accent); }
.mono { font-family:'DM Mono',monospace; }
.green { color:var(--green); }
.orange { color:var(--accent); }
.blue { color:var(--blue); }

/* Ship type tags */
.stype { display:inline-block; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px;
  padding:3px 9px; border-radius:2px; text-transform:uppercase; }
.stype-ec { background:rgba(26,140,232,0.15); color:var(--blue); }
.stype-pr { background:rgba(155,89,182,0.15); color:var(--purple); }
.stype-staff { background:rgba(39,174,96,0.15); color:var(--green); }
.stype-other { background:rgba(241,196,15,0.15); color:var(--yellow); }

/* Filter pills */
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.pill { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px;
  padding:6px 16px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--gray); cursor:pointer; transition:all 0.2s; }
.pill:hover { color:var(--white); }
.pill.all.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.pill.ec.on { background:var(--blue); color:#fff; border-color:var(--blue); }
.pill.pr.on { background:var(--purple); color:#fff; border-color:var(--purple); }
.pill.staff.on { background:var(--green); color:#fff; border-color:var(--green); }
.pill.other.on { background:var(--yellow); color:#000; border-color:var(--yellow); }

/* Ship summary cards */
.ship-sum { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
.ssum { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:16px; text-align:center; }
.ssum-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--gray); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
.ssum-val { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; }

/* ── MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88);
  z-index:500; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.overlay.open { display:flex; }
.modal { background:#161616; border:1px solid var(--border); border-radius:6px;
  width:540px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-hdr { display:flex; align-items:center; justify-content:space-between;
  padding:22px 26px; border-bottom:1px solid var(--border); }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; }
.modal-close { background:none; border:none; color:var(--gray); font-size:18px; cursor:pointer; }
.modal-close:hover { color:var(--white); }
.modal-body { padding:26px; }
.modal-footer { padding:18px 26px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.form-row.full { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--gray); letter-spacing:1.5px; text-transform:uppercase; }
.form-input, .form-select {
  background:var(--input-bg); border:1px solid var(--border); border-radius:3px;
  padding:10px 13px; color:var(--white); font-family:'Noto Sans TC',sans-serif;
  font-size:13px; outline:none; transition:border-color 0.2s; width:100%;
}
.form-input:focus, .form-select:focus { border-color:var(--accent); }
.form-select option { background:#1a1a1a; }

/* Ship type selector */
.type-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.type-opt { border:1px solid var(--border); border-radius:3px; padding:10px 6px;
  text-align:center; cursor:pointer; transition:all 0.2s; }
.type-opt .ti { font-size:18px; margin-bottom:3px; }
.type-opt .tn { font-family:'DM Mono',monospace; font-size:9px; color:var(--gray); letter-spacing:1px; }
.type-opt:hover { border-color:rgba(255,255,255,0.2); }
.type-opt.sel-ec { border-color:var(--blue); background:rgba(26,140,232,0.08); }
.type-opt.sel-pr { border-color:var(--purple); background:rgba(155,89,182,0.08); }
.type-opt.sel-staff { border-color:var(--green); background:rgba(39,174,96,0.08); }
.type-opt.sel-other { border-color:var(--yellow); background:rgba(241,196,15,0.08); }
.divider { border:none; border-top:1px solid var(--border); margin:20px 0; }

/* Toast */
.toast { position:fixed; bottom:28px; right:28px; background:#1a1a1a;
  border:1px solid var(--border); border-left:3px solid var(--accent);
  padding:14px 22px; border-radius:4px; font-family:'DM Mono',monospace;
  font-size:12px; color:var(--white); z-index:9999;
  transform:translateX(120px); opacity:0; transition:all 0.3s; }
.toast.show { transform:translateX(0); opacity:1; }
.toast.success { border-left-color:var(--green); }
.toast.error { border-left-color:var(--accent); }

/* Loading */
.loading-row td { text-align:center; padding:40px; color:var(--gray); font-family:'DM Mono',monospace; font-size:12px; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:50px; color:var(--gray); font-family:'DM Mono',monospace; font-size:12px; }

/* Stats tab breakdown */
.breakdown-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
.breakdown-card { background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.breakdown-header { padding:18px 20px; border-bottom:1px solid var(--border); }
.breakdown-body { padding:20px; }
.bar-row { margin-bottom:14px; }
.bar-meta { display:flex; justify-content:space-between; margin-bottom:5px; }
.bar-label { font-size:12px; }
.bar-val { font-family:'DM Mono',monospace; font-size:11px; }
.bar-track { height:4px; background:rgba(255,255,255,0.06); border-radius:2px; }
.bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }

@media(max-width:900px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  .main { padding:16px; }
  .header { padding:14px 16px; }
  .nav { padding:0 16px; }
  .ship-sum { grid-template-columns:repeat(2,1fr); }
  .type-grid { grid-template-columns:repeat(2,1fr); }
  .breakdown-grid { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-main">NID Running</span>
    <span class="logo-tag">庫存系統</span>
  </div>
  <div class="header-actions">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">連線中...</span>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="refreshAll()">↻ 重新整理</button>
    <button class="btn btn-primary" onclick="openModal('addShipping')">+ 記錄出貨</button>
  </div>
</header>

<nav class="nav">
  <div class="tab active" onclick="switchTab('overview',this)">總覽</div>
  <div class="tab" onclick="switchTab('inventory',this)">庫存管理</div>
  <div class="tab" onclick="switchTab('shipping',this)">出貨紀錄</div>
  <div class="tab" onclick="switchTab('stats',this)">銷售分析</div>
</nav>

<main class="main">

  <!-- 總覽 -->
  <div id="panel-overview" class="panel active">
    <div class="stats" id="statsCards"></div>
    <div class="sec-hdr">
      <div class="sec-title">庫存快覽</div>
      <button class="btn btn-secondary btn-sm" onclick="openModal('addShipping')">記錄出貨</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>商品</th><th>顏色/尺寸</th><th>現貨</th><th>已售</th><th>售價</th><th>累積營收</th>
        </tr></thead>
        <tbody id="overviewBody"><tr class="loading-row"><td colspan="6"><span class="spinner"></span>從 Google Sheet 讀取中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 庫存管理 -->
  <div id="panel-inventory" class="panel">
    <div class="sec-hdr">
      <div class="sec-title">所有商品</div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary btn-sm" onclick="openModal('adjustStock')">調整庫存</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-toolbar">
        <div class="search">
          <span style="color:var(--gray)">🔍</span>
          <input type="text" placeholder="搜尋商品名稱、SKU..." id="searchInput" oninput="renderInventory()">
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="setCatFilter('',this)" id="cf-all" style="color:var(--white)">全部</button>
          <button class="btn btn-ghost btn-sm" onclick="setCatFilter('藍',this)" id="cf-blue">藍色</button>
          <button class="btn btn-ghost btn-sm" onclick="setCatFilter('黑',this)" id="cf-black">黑色</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>商品ID</th><th>商品名稱</th><th>顏色/尺寸</th><th>進貨成本</th><th>售價</th><th>初始庫存</th><th>現貨庫存</th><th>已售</th>
        </tr></thead>
        <tbody id="inventoryBody"><tr class="loading-row"><td colspan="8"><span class="spinner"></span>讀取中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 出貨紀錄 -->
  <div id="panel-shipping" class="panel">
    <div class="sec-hdr">
      <div class="sec-title">出貨紀錄</div>
      <button class="btn btn-primary" onclick="openModal('addShipping')">+ 記錄出貨</button>
    </div>
    <div class="ship-sum" id="shipSum"></div>
    <div class="pills">
      <button class="pill all on" onclick="setShipFilter('all',this)">全部</button>
      <button class="pill ec" onclick="setShipFilter('電商出貨',this)">電商出貨</button>
      <button class="pill pr" onclick="setShipFilter('公關出貨',this)">公關出貨</button>
      <button class="pill staff" onclick="setShipFilter('員購出貨',this)">員購出貨</button>
      <button class="pill other" onclick="setShipFilter('其他出貨',this)">其他出貨</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>日期</th><th>類型</th><th>商品</th><th>數量</th><th>單價</th><th>小計</th><th>備註</th><th>出貨倉</th>
        </tr></thead>
        <tbody id="shippingBody"><tr class="loading-row"><td colspan="8"><span class="spinner"></span>讀取中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 銷售分析 -->
  <div id="panel-stats" class="panel">
    <div class="sec-title" style="margin-bottom:20px;">銷售分析</div>
    <div class="stats" id="statsCards2"></div>
    <div class="breakdown-grid">
      <div class="breakdown-card">
        <div class="breakdown-header"><div class="sec-title" style="font-size:16px;">出貨類型佔比</div></div>
        <div class="breakdown-body" id="typeBreakdown"></div>
      </div>
      <div class="breakdown-card">
        <div class="breakdown-header"><div class="sec-title" style="font-size:16px;">熱銷商品 Top 8</div></div>
        <div class="breakdown-body" id="topProducts"></div>
      </div>
    </div>
  </div>

</main>

<!-- 記錄出貨 Modal -->
<div class="overlay" id="modal-addShipping">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">記錄出貨</div>
      <button class="modal-close" onclick="closeModal('addShipping')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-label" style="margin-bottom:8px;">出貨類型</div>
      <div class="type-grid">
        <div class="type-opt" onclick="selType('電商出貨',this)"><div class="ti">🛒</div><div class="tn">電商出貨</div></div>
        <div class="type-opt" onclick="selType('公關出貨',this)"><div class="ti">🎁</div><div class="tn">公關出貨</div></div>
        <div class="type-opt" onclick="selType('員購出貨',this)"><div class="ti">👕</div><div class="tn">員購出貨</div></div>
        <div class="type-opt" onclick="selType('其他出貨',this)"><div class="ti">📦</div><div class="tn">其他出貨</div></div>
      </div>
      <hr class="divider">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">商品</label>
          <select class="form-select" id="s-product" onchange="autoPrice()">
            <option value="">請選擇商品</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">數量</label>
          <input type="number" class="form-input" id="s-qty" min="1" value="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">單價 (NT$)</label>
          <input type="number" class="form-input" id="s-price" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" class="form-input" id="s-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">收件人/對象</label>
          <input type="text" class="form-input" id="s-recipient" placeholder="收件人或品牌名">
        </div>
        <div class="form-group">
          <label class="form-label">出貨倉</label>
          <select class="form-select" id="s-warehouse">
            <option value="屏東">屏東倉庫</option>
            <option value="台北">台北</option>
          </select>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label class="form-label">備註</label>
          <input type="text" class="form-input" id="s-note" placeholder="選填">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addShipping')">取消</button>
      <button class="btn btn-primary" id="submitShipBtn" onclick="submitShipping()">確認出貨</button>
    </div>
  </div>
</div>

<!-- 調整庫存 Modal -->
<div class="overlay" id="modal-adjustStock">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">調整庫存</div>
      <button class="modal-close" onclick="closeModal('adjustStock')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">選擇商品</label>
          <select class="form-select" id="adj-product"><option value="">請選擇商品</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">調整方式</label>
          <select class="form-select" id="adj-mode">
            <option value="add">增加庫存（進貨）</option>
            <option value="set">直接設定數量</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">數量</label>
          <input type="number" class="form-input" id="adj-qty" min="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">備註</label>
          <input type="text" class="form-input" id="adj-note" placeholder="例：第二批進貨">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('adjustStock')">取消</button>
      <button class="btn btn-primary" id="submitAdjBtn" onclick="submitAdjust()">確認調整</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx1NLE1Cp4hJ8uzPVa-qdVB13Bbol922kj10WX3TblLfudb7c7jw388eX1Btfu5a_ErMg/exec';

let products = [];
let shippings = [];
let currentShipType = '';
let catFilter = '';
let shipFilter = 'all';

// ── API ──────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (status === 'online') { dot.className='sync-dot online'; txt.textContent='已連線'; }
  else if (status === 'loading') { dot.className='sync-dot loading'; txt.textContent='同步中...'; }
  else { dot.className='sync-dot'; txt.textContent='連線失敗'; }
}

async function fetchProducts() {
  const res = await fetch(API + '?action=getProducts');
  const json = await res.json();
  if (json.ok) products = json.data;
}

async function fetchShippings() {
  const res = await fetch(API + '?action=getShippings');
  const json = await res.json();
  if (json.ok) shippings = json.data;
}

async function postData(body) {
  const res = await fetch(API, {
    method:'POST',
    body: JSON.stringify(body)
  });
  return await res.json();
}

async function refreshAll() {
  setSyncStatus('loading');
  try {
    await Promise.all([fetchProducts(), fetchShippings()]);
    renderAll();
    setSyncStatus('online');
  } catch(e) {
    setSyncStatus('error');
    toast('連線失敗，請重新整理', 'error');
  }
}

// ── RENDER ───────────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString(); }

function renderStats(containerId) {
  const totalStock = products.reduce((a,p)=>a+(+p.currentStock||0),0);
  const totalSold = shippings.reduce((a,s)=>a+(+s.qty||0),0);
  const totalRev = shippings.reduce((a,s)=>a+(+s.subtotal||0),0);
  const totalProfit = products.reduce((a,p)=>a+(+p.profit||0),0);
  document.getElementById(containerId).innerHTML = `
    <div class="stat s1"><div class="stat-label">總庫存件數</div><div class="stat-val">${fmt(totalStock)}</div><div class="stat-sub">${products.length} 個 SKU</div></div>
    <div class="stat s2"><div class="stat-label">累積出貨件數</div><div class="stat-val">${fmt(totalSold)}</div><div class="stat-sub">${shippings.length} 筆紀錄</div></div>
    <div class="stat s3"><div class="stat-label">累積營收 NT$</div><div class="stat-val">${fmt(totalRev)}</div><div class="stat-sub">含所有出貨</div></div>
    <div class="stat s4"><div class="stat-label">毛利估算 NT$</div><div class="stat-val">${fmt(totalProfit)}</div><div class="stat-sub">扣除進貨成本</div></div>
  `;
}

function renderOverview() {
  const rows = products.map(p => {
    const stock = +p.currentStock || 0;
    const sold = +p.sold || 0;
    const total = stock + sold || 1;
    const pct = Math.min(100, (stock/total)*100);
    const lvl = stock > 15 ? 'hi' : stock > 5 ? 'md' : 'lo';
    return `<tr>
      <td><div class="pname">${p.name}</div><div class="psku">${p.sku}</div></td>
      <td style="color:var(--gray);font-size:12px;">${p.spec}</td>
      <td><div class="snum" style="color:${lvl==='hi'?'var(--green)':lvl==='md'?'var(--yellow)':'var(--accent)'}">${stock}</div>
        <div class="sbar"><div class="sfill ${lvl}" style="width:${pct}%"></div></div></td>
      <td><span class="mono orange">${sold}</span></td>
      <td><span class="mono">$${fmt(p.price)}</span></td>
      <td><span class="mono green">$${fmt(p.revenue)}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="6"><div class="empty">尚無商品資料</div></td></tr>';
  document.getElementById('overviewBody').innerHTML = rows;
}

function renderInventory() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  let list = products;
  if (q) list = list.filter(p => (p.name+p.sku+p.spec).toLowerCase().includes(q));
  if (catFilter) list = list.filter(p => p.spec.includes(catFilter));
  const colMap = {hi:'var(--green)',md:'var(--yellow)',lo:'var(--accent)'};
  const rows = list.map(p => {
    const stock = +p.currentStock||0;
    const lvl = stock>15?'hi':stock>5?'md':'lo';
    return `<tr>
      <td class="mono" style="color:var(--gray);font-size:11px;">${p.id}</td>
      <td><div class="pname">${p.name}</div></td>
      <td style="font-size:12px;color:var(--gray);">${p.spec}</td>
      <td class="mono" style="color:var(--gray);">$${fmt(p.cost)}</td>
      <td class="mono">$${fmt(p.price)}</td>
      <td class="mono">${fmt(p.initStock)}</td>
      <td><span class="mono" style="color:${colMap[lvl]};font-weight:600;">${stock}</span></td>
      <td><span class="mono orange">${fmt(p.sold)}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="8"><div class="empty">沒有符合的商品</div></td></tr>';
  document.getElementById('inventoryBody').innerHTML = rows;
}

function renderShipping() {
  const typeClass = {'電商出貨':'stype-ec','公關出貨':'stype-pr','員購出貨':'stype-staff','其他出貨':'stype-other'};
  const counts = {'電商出貨':0,'公關出貨':0,'員購出貨':0,'其他出貨':0};
  shippings.forEach(s => { if(counts[s.type]!==undefined) counts[s.type]+=+s.qty||0; });
  document.getElementById('shipSum').innerHTML = [
    ['電商出貨','sn-ec','var(--blue)'],['公關出貨','sn-pr','var(--purple)'],
    ['員購出貨','sn-staff','var(--green)'],['其他出貨','sn-other','var(--yellow)']
  ].map(([lbl,,clr])=>`<div class="ssum"><div class="ssum-label">${lbl}</div><div class="ssum-val" style="color:${clr}">${counts[lbl]}</div></div>`).join('');

  let list = [...shippings].reverse();
  if (shipFilter !== 'all') list = list.filter(s => s.type === shipFilter);
  const rows = list.map(s => {
    const d = s.date ? (s.date instanceof Date ? s.date.toLocaleDateString('zh-TW') : String(s.date).split('T')[0]) : '—';
    return `<tr>
      <td class="mono" style="font-size:11px;color:var(--gray);">${d}</td>
      <td><span class="stype ${typeClass[s.type]||''}">${s.type||'—'}</span></td>
      <td><div class="pname" style="font-size:12px;">${s.productName||s.productId||'—'}</div></td>
      <td class="mono">${s.qty||0}</td>
      <td class="mono">${+s.price>0?'$'+fmt(s.price):'<span style="color:var(--gray)">免費</span>'}</td>
      <td class="mono green">${+s.subtotal>0?'$'+fmt(s.subtotal):'-'}</td>
      <td style="font-size:12px;color:var(--gray);">${s.note||'—'}</td>
      <td class="mono" style="font-size:11px;color:var(--gray);">${s.warehouse||'屏東'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8"><div class="empty">尚無出貨紀錄</div></td></tr>';
  document.getElementById('shippingBody').innerHTML = rows;
}

function renderStatsTab() {
  renderStats('statsCards2');
  const types = ['電商出貨','公關出貨','員購出貨','其他出貨'];
  const colors = ['var(--blue)','var(--purple)','var(--green)','var(--yellow)'];
  const revByType = {};
  const cntByType = {};
  types.forEach(t => { revByType[t]=0; cntByType[t]=0; });
  shippings.forEach(s => {
    if (revByType[s.type]!==undefined) {
      revByType[s.type]+=+s.subtotal||0;
      cntByType[s.type]+=+s.qty||0;
    }
  });
  const totalRev = Object.values(revByType).reduce((a,b)=>a+b,0)||1;
  document.getElementById('typeBreakdown').innerHTML = types.map((t,i)=>`
    <div class="bar-row">
      <div class="bar-meta">
        <span class="bar-label" style="color:${colors[i]}">${t}</span>
        <span class="bar-val" style="color:${colors[i]}">$${fmt(revByType[t])} · ${cntByType[t]}件</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${((revByType[t]/totalRev)*100).toFixed(1)}%;background:${colors[i]}"></div></div>
    </div>`).join('');

  const soldMap = {};
  products.forEach(p=>{ soldMap[p.id]={name:p.name,spec:p.spec,qty:+p.sold||0}; });
  const top = Object.values(soldMap).sort((a,b)=>b.qty-a.qty).slice(0,8);
  const maxQ = top[0]?.qty||1;
  document.getElementById('topProducts').innerHTML = top.map((p,i)=>`
    <div class="bar-row">
      <div class="bar-meta">
        <span class="bar-label">${i+1}. ${p.name} <span style="color:var(--gray);font-size:11px;">${p.spec}</span></span>
        <span class="bar-val" style="color:var(--accent)">${p.qty}件</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(p.qty/maxQ*100).toFixed(1)}%;background:var(--accent);opacity:${1-i*0.1}"></div></div>
    </div>`).join('') || '<div class="empty">尚無銷售資料</div>';
}

function renderAll() {
  renderStats('statsCards');
  renderOverview();
  renderInventory();
  renderShipping();
  renderStatsTab();
}

// ── TABS ─────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
}

// ── FILTERS ──────────────────────────────────────────
function setCatFilter(val, btn) {
  catFilter = val;
  document.querySelectorAll('#cf-all,#cf-blue,#cf-black').forEach(b=>b.style.color='var(--gray)');
  btn.style.color='var(--white)';
  renderInventory();
}

function setShipFilter(val, btn) {
  shipFilter = val;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  renderShipping();
}

// ── MODALS ────────────────────────────────────────────
function openModal(name) {
  if (name === 'addShipping') {
    const sel = document.getElementById('s-product');
    sel.innerHTML = '<option value="">請選擇商品</option>' +
      products.map(p=>`<option value="${p.id}" data-price="${p.price}" data-stock="${p.currentStock}">${p.name} ${p.spec}（庫存:${+p.currentStock||0}）</option>`).join('');
    document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
    currentShipType = '';
    document.querySelectorAll('.type-opt').forEach(t=>t.className='type-opt');
  }
  if (name === 'adjustStock') {
    document.getElementById('adj-product').innerHTML = '<option value="">請選擇商品</option>' +
      products.map(p=>`<option value="${p.id}">${p.name} ${p.spec}（現貨:${+p.currentStock||0}）</option>`).join('');
  }
  document.getElementById('modal-'+name).classList.add('open');
}

function closeModal(name) {
  document.getElementById('modal-'+name).classList.remove('open');
}

function selType(type, el) {
  currentShipType = type;
  const cls = {'電商出貨':'sel-ec','公關出貨':'sel-pr','員購出貨':'sel-staff','其他出貨':'sel-other'};
  document.querySelectorAll('.type-opt').forEach(t=>t.className='type-opt');
  el.classList.add(cls[type]);
}

function autoPrice() {
  const sel = document.getElementById('s-product');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.price) document.getElementById('s-price').value = opt.dataset.price;
}

// ── SUBMIT ────────────────────────────────────────────
async function submitShipping() {
  if (!currentShipType) { toast('請選擇出貨類型','error'); return; }
  const pid = document.getElementById('s-product').value;
  if (!pid) { toast('請選擇商品','error'); return; }
  const qty = parseInt(document.getElementById('s-qty').value)||1;
  const price = parseInt(document.getElementById('s-price').value)||0;
  const p = products.find(x=>x.id===pid);
  if (p && +p.currentStock < qty) { toast(`庫存不足！現貨：${p.currentStock}`,'error'); return; }

  const btn = document.getElementById('submitShipBtn');
  btn.textContent='處理中...'; btn.disabled=true;

  try {
    const res = await postData({
      action:'addShipping',
      date: document.getElementById('s-date').value,
      type: currentShipType,
      productId: pid,
      qty, price,
      note: (document.getElementById('s-recipient').value||'') + (document.getElementById('s-note').value?' · '+document.getElementById('s-note').value:''),
      warehouse: document.getElementById('s-warehouse').value
    });
    if (res.ok) {
      closeModal('addShipping');
      toast(`出貨記錄成功 ✓`,'success');
      await refreshAll();
    } else { toast('出貨失敗，請重試','error'); }
  } catch(e) { toast('連線失敗','error'); }
  btn.textContent='確認出貨'; btn.disabled=false;
}

async function submitAdjust() {
  const pid = document.getElementById('adj-product').value;
  if (!pid) { toast('請選擇商品','error'); return; }
  const qty = parseInt(document.getElementById('adj-qty').value)||0;
  const mode = document.getElementById('adj-mode').value;
  const btn = document.getElementById('submitAdjBtn');
  btn.textContent='處理中...'; btn.disabled=true;
  try {
    const res = await postData({ action:'updateStock', productId:pid, qty, mode });
    if (res.ok) {
      closeModal('adjustStock');
      toast('庫存已更新 ✓','success');
      await refreshAll();
    } else { toast('更新失敗：'+res.error,'error'); }
  } catch(e) { toast('連線失敗','error'); }
  btn.textContent='確認調整'; btn.disabled=false;
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(()=>t.className='toast',3000);
}

// ── INIT ──────────────────────────────────────────────
refreshAll();
</script>
</body>
</html>
